<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>印刷プレビュー - CMYKシミュレーション</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 40px;
        }
        h1 { text-align: center; margin-bottom: 30px; color: #9b59b6; }
        .upload-zone {
            border: 3px dashed #9b59b6;
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            background: rgba(155, 89, 182, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.dragover {
            background: rgba(155, 89, 182, 0.2);
            transform: scale(1.02);
        }
        .upload-zone input { display: none; }
        .profile-select {
            margin-top: 30px;
            text-align: center;
        }
        select {
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background: #2d2d44;
            color: #fff;
            cursor: pointer;
        }
        .result {
            margin-top: 40px;
            display: none;
        }
        .compare-container {
            position: relative;
            max-width: 800px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
        }
        .compare-container img {
            width: 100%;
            display: block;
        }
        .img-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            overflow: hidden;
            border-right: 3px solid #9b59b6;
        }
        .slider {
            position: absolute;
            bottom: 20px;
            left: 10%;
            right: 10%;
            -webkit-appearance: none;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.3);
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #9b59b6;
            cursor: pointer;
        }
        .labels {
            display: flex;
            justify-content: space-between;
            max-width: 800px;
            margin: 20px auto;
            font-size: 14px;
            color: #aaa;
        }
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(155, 89, 182, 0.3);
            border-top-color: #9b59b6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>🎨 印刷プレビュー - CMYKシミュレーション</h1>
    
    <div class="upload-zone" id="dropZone">
        <input type="file" id="fileInput" accept="image/*">
        <p>📁 画像をドラッグ&ドロップするか、クリックして選択</p>
        <p style="font-size: 12px; color: #888; margin-top: 10px;">対応形式: PNG, JPG, WEBP</p>
    </div>
    
    <div class="profile-select">
        <label>印刷所プロファイル：</label>
        <select id="profile">
            <option value="cmyk_standard">標準CMYK (JapanColor2001)</option>
            <option value="printful">Printful推奨設定</option>
            <option value="suzuri">SUZURI推奨設定</option>
        </select>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>変換中...</p>
    </div>
    
    <div class="result" id="result">
        <div class="labels">
            <span>← RGB原稿</span>
            <span>印刷シミュレーション →</span>
        </div>
        <div class="compare-container" id="compareContainer">
            <img id="previewImg" src="" alt="preview">
            <div class="img-overlay" id="overlay">
                <img id="originalImg" src="" alt="original">
            </div>
            <input type="range" class="slider" id="slider" min="0" max="100" value="50">
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const slider = document.getElementById('slider');
        const overlay = document.getElementById('overlay');
        
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        
        slider.addEventListener('input', (e) => {
            overlay.style.width = e.target.value + '%';
        });
        
        async function handleFile(file) {
            if (!file) return;
            
            loading.style.display = 'block';
            result.style.display = 'none';
            
            const formData = new FormData();
            formData.append('image', file);
            formData.append('profile', document.getElementById('profile').value);
            
            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);
                
                document.getElementById('originalImg').src = data.original;
                document.getElementById('previewImg').src = data.preview;
                
                loading.style.display = 'none';
                result.style.display = 'block';
                slider.value = 50;
                overlay.style.width = '50%';
            } catch (err) {
                alert('エラー: ' + err.message);
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
