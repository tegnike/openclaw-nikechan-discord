<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Tuber - ニケちゃん</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 {
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .avatar-container {
            width: 400px;
            height: 400px;
            margin: 20px auto;
            position: relative;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #avatar {
            max-width: 90%;
            max-height: 90%;
            transition: transform 0.1s ease;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        button:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        button.active {
            background: #ff6b9d;
        }
        .volume-bar {
            width: 300px;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
        }
        .volume-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            width: 0%;
            transition: width 0.05s ease;
        }
        .status {
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: inline-block;
        }
        .tts-section {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            max-width: 500px;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        select {
            padding: 10px;
            border: none;
            border-radius: 10px;
            margin: 10px 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎭 PNG Tuber - ニケちゃん</h1>
        
        <div class="avatar-container">
            <img id="avatar" src="" alt="Avatar">
        </div>
        
        <div class="volume-bar">
            <div class="volume-fill" id="volumeFill"></div>
        </div>
        
        <div class="status" id="status">マイク権限を待っています...</div>
        
        <div class="controls">
            <button id="micBtn" onclick="toggleMic()">🎤 マイク開始</button>
            <button onclick="setEmotion('normal')">😊 通常</button>
            <button onclick="setEmotion('happy')">😄 笑顔</button>
            <button onclick="setEmotion('surprise')">😲 驚き</button>
            <button onclick="setEmotion('sleepy')">😴 眠い</button>
        </div>
        
        <div class="tts-section">
            <h3>🗣️ VOICEVOX連携</h3>
            <textarea id="ttsText" placeholder="話させたいテキストを入力...">こんにちは、めいちゃん！</textarea>
            <br>
            <select id="speakerId">
                <option value="3">ずんだもん（ノーマル）</option>
                <option value="1">四国めたん（あまあま）</option>
                <option value="8">春日部つむぎ（ノーマル）</option>
            </select>
            <button onclick="speak()">🔊 話す</button>
        </div>
    </div>

    <script>
        // Discordスタンプ画像URL
        const AVATARS = {
            normal: 'https://cdn.discordapp.com/emojis/1473092441107202120.png',
            happy: 'https://cdn.discordapp.com/emojis/1472503800974803049.png',
            surprise: 'https://cdn.discordapp.com/emojis/1473092191885852885.png',
            sleepy: 'https://cdn.discordapp.com/emojis/1472230286409335073.png'
        };
        
        let currentEmotion = 'normal';
        let audioContext = null;
        let analyser = null;
        let microphone = null;
        let isListening = false;
        let animationId = null;
        
        // 初期化
        document.getElementById('avatar').src = AVATARS.normal;
        
        function setEmotion(emotion) {
            currentEmotion = emotion;
            document.getElementById('avatar').src = AVATARS[emotion];
            document.getElementById('avatar').style.transform = 'scale(1.1)';
            setTimeout(() => {
                document.getElementById('avatar').style.transform = 'scale(1)';
            }, 100);
        }
        
        async function toggleMic() {
            const btn = document.getElementById('micBtn');
            const status = document.getElementById('status');
            
            if (isListening) {
                stopMic();
                btn.textContent = '🎤 マイク開始';
                btn.classList.remove('active');
                status.textContent = 'マイク停止中';
                return;
            }
            
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                microphone = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                microphone.connect(analyser);
                
                isListening = true;
                btn.textContent = '⏹️ マイク停止';
                btn.classList.add('active');
                status.textContent = '音声検出中...';
                
                detectVolume();
            } catch (err) {
                status.textContent = 'マイク権限が必要です: ' + err.message;
                console.error(err);
            }
        }
        
        function detectVolume() {
            if (!isListening) return;
            
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            
            // RMS計算
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i] * dataArray[i];
            }
            const rms = Math.sqrt(sum / dataArray.length);
            const volume = Math.min(rms / 128, 1); // 正規化
            
            // 音量バー更新
            document.getElementById('volumeFill').style.width = (volume * 100) + '%';
            
            // 表情切り替え
            if (volume < 0.1) {
                if (currentEmotion !== 'normal') setEmotion('normal');
            } else if (volume < 0.3) {
                if (currentEmotion !== 'happy') setEmotion('happy');
            } else if (volume < 0.6) {
                if (currentEmotion !== 'surprise') setEmotion('surprise');
            } else {
                if (currentEmotion !== 'sleepy') setEmotion('sleepy');
            }
            
            animationId = requestAnimationFrame(detectVolume);
        }
        
        function stopMic() {
            isListening = false;
            if (animationId) cancelAnimationFrame(animationId);
            if (microphone) microphone.disconnect();
            if (audioContext) audioContext.close();
            document.getElementById('volumeFill').style.width = '0%';
        }
        
        // VOICEVOX連携
        async function speak() {
            const text = document.getElementById('ttsText').value;
            const speakerId = document.getElementById('speakerId').value;
            const status = document.getElementById('status');
            
            if (!text.trim()) {
                status.textContent = 'テキストを入力してください';
                return;
            }
            
            status.textContent = 'VOICEVOXで合成中...';
            
            try {
                // 1. Audio Query取得
                const queryRes = await fetch(
                    `http://localhost:50021/audio_query?text=${encodeURIComponent(text)}&speaker=${speakerId}`,
                    { method: 'POST' }
                );
                
                if (!queryRes.ok) throw new Error('VOICEVOXが起動していません');
                
                const audioQuery = await queryRes.json();
                
                // 2. 音声合成
                const synthRes = await fetch(
                    `http://localhost:50021/synthesis?speaker=${speakerId}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(audioQuery)
                    }
                );
                
                if (!synthRes.ok) throw new Error('音声合成に失敗しました');
                
                // 3. 音声再生
                const wavBlob = await synthRes.blob();
                const audioUrl = URL.createObjectURL(wavBlob);
                const audio = new Audio(audioUrl);
                
                // 口パクアニメーション
                audio.onplay = () => {
                    status.textContent = '再生中...';
                    lipSyncAnimation(audio);
                };
                
                audio.onended = () => {
                    status.textContent = '再生完了';
                    setEmotion('normal');
                    URL.revokeObjectURL(audioUrl);
                };
                
                await audio.play();
                
            } catch (err) {
                status.textContent = 'エラー: ' + err.message;
                console.error(err);
            }
        }
        
        function lipSyncAnimation(audio) {
            const duration = audio.duration * 1000;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                if (elapsed >= duration || audio.paused) {
                    setEmotion('normal');
                    return;
                }
                
                // ランダムに口パク
                const emotions = ['happy', 'surprise', 'normal'];
                const randomEmotion = emotions[Math.floor(Math.random() * emotions.length)];
                setEmotion(randomEmotion);
                
                setTimeout(() => animate(), 150);
            }
            
            animate();
        }
    </script>
</body>
</html>
